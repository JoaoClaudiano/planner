<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rotina · estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f1; --surface:#fff; --surface2:#f0ede8; --surface3:#e8e4dd;
  --text:#181816; --text2:#5a5652; --text3:#9a9690;
  --border:#dedad4; --border2:#c8c4bc;
  --accent:#2563eb; --accent-bg:#eff6ff; --accent2:#1d4ed8;
  --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
  --r:10px; --sh:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.05);
  --c1:#d97706; --c1b:#fef3c7; --c1d:#92400e;
  --c2:#2563eb; --c2b:#dbeafe; --c2d:#1e3a8a;
  --c3:#7c3aed; --c3b:#ede9fe; --c3d:#4c1d95;
  --c4:#059669; --c4b:#d1fae5; --c4d:#064e3b;
  --ev:#6366f1; --evb:#e0e7ff;
  --warn:#dc2626; --warnb:#fee2e2; --ok:#059669; --okb:#d1fae5;
}
body.dark {
  /* Superfícies mais contrastantes entre si */
  --bg:#0d0d0c;
  --surface:#181816;
  --surface2:#212120;
  --surface3:#2d2d2b;
  /* Texto com hierarquia clara */
  --text:#f2efe9;
  --text2:#b0aa9f;
  --text3:#6a6560;
  /* Bordas visíveis mas sutis */
  --border:#2e2e2b;
  --border2:#404040;
  /* Accent mais brilhante para dark */
  --accent:#4f8ef7;
  --accent-bg:#1a2d50;
  --accent2:#7ab0ff;
  /* Cores das disciplinas: mais saturadas no dark */
  --c1:#f59e0b; --c1b:#2d1f05;
  --c2:#3b82f6; --c2b:#0f1f3d;
  --c3:#a78bfa; --c3b:#1e1040;
  --c4:#34d399; --c4b:#062818;
  --ev:#818cf8; --evb:#1e1f40;
  --warn:#f87171; --warnb:#2d0f0f;
  --ok:#34d399; --okb:#062818;
}

/* Ping pulsante para o dia atual */
@keyframes ping {
  0%   { transform: scale(1);   opacity: 1; }
  70%  { transform: scale(2.2); opacity: 0; }
  100% { transform: scale(2.2); opacity: 0; }
}
@keyframes ping-inner {
  0%, 100% { opacity: 1; }
  50%       { opacity: .7; }
}
.today-ping {
  position: relative; display: inline-flex; align-items: center; justify-content: center;
}
.today-ping::before {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--warn);
  top: -3px; right: -3px;
  animation: ping 1.8s cubic-bezier(0,0,.2,1) infinite;
}
.today-ping::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--warn);
  top: -3px; right: -3px;
  animation: ping-inner 1.8s ease-in-out infinite;
}
/* Coluna do dia atual tem fundo levemente destacado */
.cal-dcol.is-today-col { background: color-mix(in srgb, var(--accent) 4%, transparent); }
body.dark .cal-dcol.is-today-col { background: color-mix(in srgb, var(--accent) 6%, transparent); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.5; min-height: 100vh;
  display: flex; flex-direction: column; transition: background .2s, color .2s;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─ HEADER ─ */
header {
  position: sticky; top: 0; z-index: 200;
  height: 50px; padding: 0 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.logo { font-family: var(--mono); font-size: 12px; color: var(--text2); letter-spacing: .02em; }
.logo b { color: var(--accent); font-weight: 500; }
.clock { font-family: var(--mono); font-size: 11px; color: var(--text3);
  padding: 2px 9px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; margin-left: .6rem; letter-spacing: .04em; }
.hright { display: flex; gap: .35rem; align-items: center; }
.hbtn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 10px; font-size: 11px; color: var(--text2); cursor: pointer;
  font-family: var(--sans); transition: all .15s; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.hbtn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
body.dark .hbtn { border-color: var(--border2); color: var(--text2); }
body.dark .hbtn:hover { background: var(--surface3); color: var(--text); }

/* ─ MAIN ─ */
main { flex: 1; max-width: 1100px; width: 100%; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; display: flex; flex-direction: column; gap: 2rem; }

/* ─ SECTION TITLE ─ */
.st { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; }
.st::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ─ WEEK NAV ─ */
.wknav { display: flex; align-items: center; gap: .4rem; margin-bottom: .75rem; flex-wrap: wrap; }
.wklabel { font-family: var(--mono); font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
.warr { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text2); transition: all .15s; }
.warr:hover { background: var(--surface2); }
.btn-today { background: var(--accent-bg); border: 1px solid var(--accent); color: var(--accent); padding: 3px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: var(--sans); transition: all .15s; }
.btn-today:hover { background: var(--accent); color: #fff; }
.semprog { margin-left: auto; display: flex; align-items: center; gap: .4rem; font-family: var(--mono); font-size: 10px; color: var(--text3); }
.sembar { width: 60px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.semfill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s; }

/* ─ CALENDAR ─ */
.cal-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); }
.cal-scroll { overflow-x: auto; overflow-y: auto; max-height: 520px; }
.cal-inner { min-width: 700px; }

/* Grid: col 0 = time gutter (52px), cols 1-7 = days */
.cal-head, .cal-body { display: grid; grid-template-columns: 52px repeat(7, 1fr); }
.cal-head { border-bottom: 2px solid var(--border); }

.cal-gutter { border-right: 1px solid var(--border); }
.cal-dh { padding: 7px 4px 6px; text-align: center; border-right: 1px solid var(--border); cursor: default; }
.cal-dh:last-child { border-right: none; }
.dname { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-weight: 500; }
.dnum { font-size: 15px; font-weight: 300; color: var(--text); font-family: var(--mono); line-height: 1; margin-top: 2px; }
.cal-dh.is-today .dnum { background: var(--accent); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 2px auto 0; font-size: 12px; font-weight: 600; }
.cal-dh.is-today .dname { color: var(--accent); }
.cal-dh.is-past { opacity: .4; }

/* Body */
.cal-tcol { /* time column */ }
.cal-ts { height: 48px; border-right: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: flex-end; padding: 2px 6px 0 0; }
.cal-tl { font-family: var(--mono); font-size: 9px; color: var(--text3); transform: translateY(-50%); }
.cal-dcol { border-right: 1px solid var(--border); position: relative; overflow: visible; }
.cal-dcol:last-child { border-right: none; }
.cal-hl { height: 48px; border-bottom: 1px solid var(--border); position: relative; transition: background .1s; }
.cal-hl:hover { background: color-mix(in srgb, var(--accent) 6%, transparent); cursor: cell; }
.cal-hl:hover::after { content: '+'; position: absolute; right: 4px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--accent); opacity: .5; pointer-events: none; font-weight: 300; }
.cal-hl.half { border-bottom: 1px dashed var(--border); height: 24px; }
.cal-hl:last-child { border-bottom: none; }

/* Drop zone highlight */
.cal-dcol.drag-over .cal-hl { background: var(--accent-bg); }

@keyframes now-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.4); opacity: .7; }
}
/* Now line */
.now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--warn); z-index: 15; pointer-events: none; }
.now-line::before { content: ''; position: absolute; left: -5px; top: -5px; width: 12px; height: 12px; border-radius: 50%; background: var(--warn); animation: now-pulse 2s ease-in-out infinite; }

/* Events */
.cal-ev {
  position: absolute; left: 2px; right: 2px; border-radius: 6px;
  padding: 3px 6px; font-size: 11px; line-height: 1.3; overflow: hidden;
  cursor: pointer; z-index: 10; border-left: 3px solid;
  transition: filter .15s, box-shadow .15s, transform .1s;
  user-select: none;
}
.cal-ev:hover { filter: brightness(.93); box-shadow: 0 2px 8px rgba(0,0,0,.12); transform: scale(1.01); }
.cal-ev.ev-past { opacity: .45; }
.ev-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
.ev-time { font-family: var(--mono); font-size: 10px; opacity: .65; }
.ev-check { font-size: 10px; color: var(--ok); }
/* Course colors */
.cal-ev.c1 { background: var(--c1b); border-color: var(--c1); color: var(--text); }
.cal-ev.c2 { background: var(--c2b); border-color: var(--c2); color: var(--text); }
.cal-ev.c3 { background: var(--c3b); border-color: var(--c3); color: var(--text); }
.cal-ev.c4 { background: var(--c4b); border-color: var(--c4); color: var(--text); }
body.dark .cal-ev.c1 .ev-name { color: var(--c1); }
body.dark .cal-ev.c2 .ev-name { color: var(--c2); }
body.dark .cal-ev.c3 .ev-name { color: var(--c3); }
body.dark .cal-ev.c4 .ev-name { color: var(--c4); }
/* Reminder/custom event */
.cal-ev.ev-custom { background: var(--evb); border-color: var(--ev); color: var(--text); }
.cal-ev.ev-custom .ev-name { color: var(--ev); }
.ev-check { font-size: 10px; color: var(--ok); font-weight: 600; }

/* "New event" slot when hovering empty cell */
.cal-new-hint {
  position: absolute; left: 2px; right: 2px; border-radius: 5px;
  background: var(--accent-bg); border: 1px dashed var(--accent);
  opacity: 0; pointer-events: none; z-index: 8; transition: opacity .1s;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--accent);
}

/* ─ EVENT TOOLTIP / POPUP ─ */
.ev-popup {
  position: fixed; z-index: 500;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: 0 8px 30px rgba(0,0,0,.15);
  padding: 1rem 1.1rem 1rem; min-width: 230px; max-width: 280px;
  display: none;
}
.ev-popup.open { display: block; }
.ev-popup-title { font-weight: 600; font-size: 14px; margin-bottom: .25rem; }
.ev-popup-meta { font-size: 12px; color: var(--text2); margin-bottom: .75rem; display: flex; flex-direction: column; gap: .2rem; }
.ev-popup-meta span { display: flex; align-items: center; gap: .4rem; }
.ev-popup-actions { display: flex; gap: .4rem; flex-wrap: wrap; }
.ep-btn { border: 1px solid var(--border); background: var(--surface2); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--sans); color: var(--text2); transition: all .15s; }
.ep-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
.ep-btn.danger:hover { background: var(--warnb); color: var(--warn); border-color: var(--warn); }
.ep-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.ep-btn.primary:hover { background: var(--accent2); }
.ep-close { position: absolute; top: .6rem; right: .7rem; background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text3); line-height: 1; }
.ep-divider { height: 1px; background: var(--border); margin: .75rem 0; }

/* ─ NEW EVENT MODAL ─ */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); backdrop-filter: blur(4px); z-index: 400; align-items: center; justify-content: center; padding: 1rem; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; max-width: 400px; width: 100%; padding: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
.modal-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text3); }
.form-group { margin-bottom: .9rem; }
.form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .06em; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 10px; font-size: 13px; color: var(--text);
  font-family: var(--sans); outline: none; transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: var(--surface); }
.form-textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
.form-color-row { display: flex; gap: .4rem; flex-wrap: wrap; }
.color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .1s; }
.color-swatch:hover, .color-swatch.sel { border-color: var(--text); transform: scale(1.15); }
.modal-footer { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1.1rem; }
.btn-cancel { background: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--text2); font-family: var(--sans); }
.btn-save { background: var(--accent); color: #fff; border: none; padding: 6px 16px; border-radius: 7px; font-size: 13px; cursor: pointer; font-family: var(--sans); font-weight: 500; transition: opacity .15s; }
.btn-save:hover { opacity: .88; }

/* ─ ATTENDANCE ─ */
.att-grid { display: flex; flex-direction: column; gap: .55rem; }
.att-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); }
.att-head { display: flex; align-items: center; gap: .6rem; padding: .65rem 1rem; cursor: pointer; user-select: none; transition: background .1s; }
.att-head:hover { background: var(--surface2); }
.att-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.att-name { font-weight: 500; font-size: 13px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.att-code { font-family: var(--mono); font-size: 10px; color: var(--text3); flex-shrink: 0; }

/* Horas badge */
.att-hbadge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); white-space: nowrap; }
.att-pill { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); white-space: nowrap; }
.att-pill.safe { background: var(--okb); color: var(--ok); border-color: color-mix(in srgb, var(--ok) 40%, transparent); }
.att-pill.warn { background: color-mix(in srgb, #f59e0b 15%, transparent); color: #f59e0b; border-color: color-mix(in srgb, #f59e0b 50%, transparent); }
.att-pill.danger { background: var(--warnb); color: var(--warn); border-color: color-mix(in srgb, var(--warn) 50%, transparent); }
.att-chev { color: var(--text3); font-size: 11px; transition: transform .2s; flex-shrink: 0; }
.att-card.open .att-chev { transform: rotate(180deg); }
.att-prog { height: 3px; background: var(--border); }
.att-prog-fill { height: 100%; transition: width .4s; border-radius: 0 2px 2px 0; }

.att-body { display: none; border-top: 1px solid var(--border); }
.att-card.open .att-body { display: block; }

/* Resumo de horas dentro do card */
.att-summary-bar {
  display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
  padding: .75rem 1rem; background: var(--surface2); border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.att-stat { display: flex; flex-direction: column; gap: 1px; }
.att-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
.att-stat-val { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
.att-stat-val.danger { color: var(--warn); }
.att-stat-val.ok { color: var(--ok); }

.att-list { padding: .5rem .75rem; max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: .25rem; }
.att-row { display: flex; align-items: center; gap: .6rem; padding: .3rem .35rem; border-radius: 6px; transition: background .1s; }
.att-row:hover { background: var(--surface2); }
.att-cb { width: 14px; height: 14px; border-radius: 3px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); }
.att-row-date { font-family: var(--mono); font-size: 11px; color: var(--text3); width: 80px; flex-shrink: 0; }
.att-row-day { font-size: 12px; color: var(--text2); width: 28px; flex-shrink: 0; }
.att-row-h { font-family: var(--mono); font-size: 11px; color: var(--text3); flex: 1; }
.att-row-hval { font-family: var(--mono); font-size: 11px; color: var(--text2); width: 28px; text-align: right; flex-shrink: 0; }
.abadge { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 20px; flex-shrink: 0; }
.abadge.today { background: var(--accent); color: #fff; }
.abadge.future { background: var(--surface3); color: var(--text3); border: 1px solid var(--border); }
.abadge.falta { background: var(--warnb); color: var(--warn); }

.att-footer { display: flex; align-items: center; justify-content: space-between; gap: .5rem; flex-wrap: wrap; padding: .6rem 1rem; border-top: 1px solid var(--border); background: var(--surface2); }
.att-warn-txt { font-size: 11px; color: var(--warn); font-weight: 500; }
.att-mark-btn { background: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 11px; color: var(--text2); cursor: pointer; font-family: var(--sans); transition: all .15s; }
.att-mark-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

/* ─ LISTS ─ */
.lists-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 560px) { .lists-grid { grid-template-columns: 1fr; } }
.lcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); }
.lcard-head { padding: .6rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 500; color: var(--text2); }
.lcnt { font-family: var(--mono); font-size: 10px; background: var(--surface2); padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border); color: var(--text3); }
.litems { padding: .2rem 0; max-height: 280px; overflow-y: auto; }
.litem { display: flex; align-items: center; gap: .5rem; padding: .38rem .75rem; transition: background .1s, opacity .3s; }
.litem:hover { background: var(--surface2); }
.litem.done { opacity: .4; }
.lcb { width: 13px; height: 13px; border-radius: 3px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); }
.ltxt { flex: 1; font-size: 13px; cursor: pointer; padding: 1px 3px; border-radius: 4px; transition: background .1s; word-break: break-word; }
.ltxt:hover { background: var(--border); }
.litem.done .ltxt { text-decoration: line-through; color: var(--text3); }
.ldel { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 12px; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
.litem:hover .ldel { opacity: 1; }
.ldel:hover { color: var(--warn); background: var(--warnb); }
.ladd { display: flex; gap: .4rem; padding: .5rem .75rem; border-top: 1px solid var(--border); }
.linput { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; font-size: 12px; color: var(--text); font-family: var(--sans); outline: none; transition: border-color .15s; }
.linput:focus { border-color: var(--accent); background: var(--surface); }
.laddbtn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 15px; cursor: pointer; line-height: 1; transition: opacity .15s; }
.laddbtn:hover { opacity: .85; }

/* ─ TOAST ─ */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: .45rem .9rem; border-radius: 7px; font-size: 12px; z-index: 9999; opacity: 0; transition: opacity .2s; pointer-events: none; display: flex; align-items: center; gap: .6rem; box-shadow: 0 4px 20px rgba(0,0,0,.25); white-space: nowrap; }
.toast.show { opacity: 1; pointer-events: auto; }
.tundo { background: none; border: 1px solid rgba(255,255,255,.3); color: inherit; padding: 2px 7px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: var(--sans); }
.tundo:hover { background: rgba(255,255,255,.15); }

/* ─ FOOTER ─ */
footer { border-top: 1px solid var(--border); padding: .6rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: .5rem; flex-wrap: wrap; }
.finfo { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.factions { display: flex; gap: .35rem; }
.btt { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 32px; height: 32px; border-radius: 7px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: var(--sh); opacity: 0; pointer-events: none; transition: opacity .2s, transform .1s; z-index: 50; }
.btt.show { opacity: 1; pointer-events: auto; }
.btt:hover { transform: translateY(-2px); }

@media (max-width: 640px) { .semprog { display: none; } .clock { display: none; } main { padding: 1rem 1rem 2.5rem; } }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="logo">rotina<b>·</b>estudos</span>
    <span class="clock" id="clock">00:00:00</span>
  </div>
  <div class="hright">
    <span id="hdrBadge" style="display:none;font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:20px;border:1px solid color-mix(in srgb,var(--warn) 50%,transparent);background:var(--warnb);color:var(--warn);"></span>
    <button class="hbtn" id="btnDark">☀ claro</button>
    <button class="hbtn" id="btnExport">↑ exportar</button>
    <button class="hbtn" id="btnImport">↓ importar</button>

</header>

<main>

  <!-- AGENDA -->
  <section>
    <p class="st">agenda semanal</p>
    <div class="wknav">
      <button class="warr" id="wkPrev">‹</button>
      <button class="warr" id="wkNext">›</button>
      <span class="wklabel" id="wkLabel">—</span>
      <button class="btn-today" id="btnToday" title="voltar para hoje (tecla T)">hoje</button>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:2px 6px;" title="use ← → para navegar semanas">← →</span>
      <div class="semprog">
        <span id="semLabel">—</span>
        <div class="sembar"><div class="semfill" id="semFill" style="width:0%"></div></div>
        <span id="semPct">—</span>
      </div>
    </div>
    <div class="cal-wrap"><div class="cal-scroll"><div class="cal-inner" id="calInner"></div></div></div>
    <p style="font-size:11px;color:var(--text3);margin-top:.5rem;display:flex;align-items:center;gap:.5rem;">
      <span style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:1px 7px;font-family:var(--mono);font-size:10px;color:var(--text2);">clique na aula</span> marcar presença
      <span style="margin:0 .25rem;color:var(--border2)">·</span>
      <span style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:1px 7px;font-family:var(--mono);font-size:10px;color:var(--text2);">clique vazio</span> criar evento

  <!-- PRESENÇA -->

  <!-- LISTAS -->
  <section>
    <p class="st">anotações</p>
    <div class="lists-grid">
      <div class="lcard">
        <div class="lcard-head"><span>⏱ tarefas</span><span class="lcnt" id="taskCnt">—</span></div>
        <ul class="litems" id="taskList"></ul>
        <div class="ladd"><input class="linput" id="taskInp" placeholder="nova tarefa…" autocomplete="off"><button class="laddbtn" id="taskAdd">+</button></div>
      </div>
      <div class="lcard">
        <div class="lcard-head"><span>📚 tópicos</span><span class="lcnt" id="topicCnt">—</span></div>
        <ul class="litems" id="topicList"></ul>
        <div class="ladd"><input class="linput" id="topicInp" placeholder="novo tópico…" autocomplete="off"><button class="laddbtn" id="topicAdd">+</button></div>
      </div>

</main>

<footer>
  <span class="finfo" id="footerInfo">—</span>
  <div class="factions">
    <button class="hbtn" id="btnExport2">↑ exportar</button>

<button class="btt" id="btt">↑</button>
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<!-- POPUP de evento (aula ou lembrete) -->
<div class="ev-popup" id="evPopup">

<!-- MODAL novo evento/lembrete -->
<div class="modal-bg" id="newEvModal">
  <div class="modal">
    <button class="modal-close" id="newEvClose">×</button>
    <h3 id="newEvTitle">Novo lembrete</h3>
    <div class="form-group">
      <label>Título</label>
      <input class="form-input" id="evName" placeholder="ex: Prova de Resistência dos Materiais" autocomplete="off">

    <div class="form-row">
      <div class="form-group">
        <label>Data</label>
        <input class="form-input" type="date" id="evDate">
      </div>

        <label>Tipo</label>
        <select class="form-select" id="evType">
          <option value="lembrete">📌 Lembrete</option>
          <option value="prova">📝 Prova / Avaliação</option>

      <div class="form-group">

        <label>Fim</label>

</div>

<input type="file" id="importFile" accept=".json" style="display:none">

<script>
'use strict';
(function () {

// ═══════════════════════════════════════════════
// DADOS
// ═══════════════════════════════════════════════
// dia: 0=dom,1=seg,2=ter,3=qua,4=qui,5=sex,6=sab (igual JS getDay())
const COURSES = [
  { id:'TC0610', nome:'Materiais Betuminosos',        turma:'01', local:'Bloco 708 – Sala 24',
    horarios:[{dia:3,ini:14,fim:17}],    // Quarta 14–17h (3h/aula)
    ini:new Date(2026,2,2), fim:new Date(2026,6,7), cls:'c1', cor:'#f59e0b' },
  { id:'TB0793', nome:'Resistência dos Materiais I',  turma:'02', local:'Bloco 708 – Sala 23',
    horarios:[{dia:2,ini:14,fim:16},{dia:4,ini:14,fim:16}], // Ter+Qui 14–16h (2h/aula)
    ini:new Date(2026,2,2), fim:new Date(2026,6,7), cls:'c2', cor:'#3b82f6' },
  { id:'TD0022', nome:'Instalações Hidrossanitárias', turma:'01', local:'Bloco 727 – Sala 21',
    horarios:[{dia:1,ini:10,fim:13}],    // Segunda 10–13h (3h/aula)
    ini:new Date(2026,2,2), fim:new Date(2026,6,7), cls:'c3', cor:'#8b5cf6' },
  { id:'TD0023', nome:'Sistemas de Abastecimento',    turma:'01', local:'Bloco 708 – Sala 22',
    horarios:[{dia:1,ini:8,fim:10}],     // Segunda 8–10h (2h/aula)
    ini:new Date(2026,2,2), fim:new Date(2026,6,7), cls:'c4', cor:'#10b981' },
];

// Gera todas as aulas do semestre para cada curso
function gerarAulas(c) {
  const out = [];
  c.horarios.forEach(h => {
    let d = new Date(c.ini);
    while (d.getDay() !== h.dia) d.setDate(d.getDate() + 1);
    while (d <= c.fim) {
      const horas = h.fim - h.ini;
      out.push({
        id: `${c.id}-${d.toISOString().slice(0,10)}-${h.ini}`,
        cursoId: c.id, date: new Date(d),
        ini: h.ini, fim: h.fim, horas,
      });
      d = new Date(d); d.setDate(d.getDate() + 7);
    }
  });
  return out.sort((a,b) => a.date - b.date || a.ini - b.ini);
}
COURSES.forEach(c => {
  c._aulas = gerarAulas(c);
  // carga horária total e máximo de faltas em horas
  c._totalH = c._aulas.reduce((s,a) => s + a.horas, 0);
  c._maxFaltasH = Math.floor(c._totalH * 0.25); // 25% da CH
});

// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
const LS = { att:'v3_att', ev:'v3_ev', tasks:'v3_tasks', topics:'v3_topics', dark:'v3_dark' };
let att = {};           // { aulaId: bool }
let customEvents = [];  // [{id,nome,date,ini,fim,type,cor,note}]
let tasks  = [];        // [{id,text,checked}]
let topics = [];        // [{id,text,checked}]
let undoBuf = null, undoTm = null;
const listTm = {};

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function load() {
  try { att = JSON.parse(localStorage.getItem(LS.att) || '{}'); } catch { att = {}; }
  try { customEvents = JSON.parse(localStorage.getItem(LS.ev) || '[]'); } catch { customEvents = []; }
  // Restaurar datas como Date objects
  customEvents.forEach(e => { e.date = new Date(e.date); });

  function mig(raw, defs) {
    if (!raw) return defs.map(t => ({id:uid(),text:t,checked:false}));
    try {
      const p = JSON.parse(raw);
      if (!Array.isArray(p)) return defs.map(t => ({id:uid(),text:t,checked:false}));
      if (p.length && typeof p[0] === 'string') return p.map(t => ({id:uid(),text:t,checked:false}));
      return p;
    } catch { return defs.map(t => ({id:uid(),text:t,checked:false})); }
  }
  tasks  = mig(localStorage.getItem(LS.tasks),  ['Revisar Materiais Betuminosos cap.2','Exercícios Resistência dos Materiais','Resumo Instalações Hidrossanitárias']);
  topics = mig(localStorage.getItem(LS.topics), ['TC0610 – ligantes betuminosos','TC0610 – ensaio de penetração','TB0793 – lei de Hooke','TD0022 – ramais e colunas']);

  const sd = localStorage.getItem(LS.dark);
  // Default: dark ON (only override if user explicitly chose light)
  const isDark = sd !== null ? sd === 'true' : true;
  if (isDark) {
    document.body.classList.add('dark');
    document.getElementById('btnDark').textContent = '☀ claro';
  }
}

function save(quiet=false) {
  localStorage.setItem(LS.att, JSON.stringify(att));
  // Serializar eventos com data ISO
  const evSerial = customEvents.map(e => ({...e, date: e.date instanceof Date ? e.date.toISOString() : e.date}));
  localStorage.setItem(LS.ev, JSON.stringify(evSerial));
  localStorage.setItem(LS.tasks, JSON.stringify(tasks));
  localStorage.setItem(LS.topics, JSON.stringify(topics));
  if (!quiet) showToast('salvo');
  updateFooter();
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTm = null;
function showToast(msg, undo=false) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  const old = el.querySelector('.tundo'); if (old) old.remove();
  if (undo) {
    const b = document.createElement('button'); b.className = 'tundo'; b.textContent = 'desfazer';
    b.onclick = () => { doUndo(); el.classList.remove('show'); };
    el.appendChild(b);
  }
  el.classList.add('show');
  if (toastTm) clearTimeout(toastTm);
  toastTm = setTimeout(() => el.classList.remove('show'), undo ? 5000 : 1800);
}
function doUndo() {
  if (!undoBuf) return;
  const {type, item, index} = undoBuf;
  (type === 'task' ? tasks : topics).splice(index, 0, item);
  save(true); renderList(type); undoBuf = null;
}

// ═══════════════════════════════════════════════
// RELÓGIO
// ═══════════════════════════════════════════════
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick, 1000); tick();

// ═══════════════════════════════════════════════
// SEMANA
// ═══════════════════════════════════════════════
let wkOff = 0;
const DNAMES = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
// code2py: JS getDay() → índice col (0=Seg…6=Dom)
// getDay(): 0=dom,1=seg,2=ter,3=qua,4=qui,5=sex,6=sab
// col index: 0=seg,1=ter,2=qua,3=qui,4=sex,5=sab,6=dom
function getWeekDates(off=0) {
  const now = new Date(); now.setHours(0,0,0,0);
  const dow = (now.getDay() + 6) % 7; // 0=seg
  const mon = new Date(now); mon.setDate(now.getDate() - dow + off * 7);
  return Array.from({length:7}, (_, i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function fmt(d) { return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}); }

function renderSemProg() {
  const ini = new Date(2026,2,2), fim = new Date(2026,6,7), now = new Date();
  const total = fim - ini, elapsed = Math.min(Math.max(now - ini, 0), total);
  const pct = total > 0 ? elapsed / total * 100 : 0;
  const semTot = Math.ceil(total / (7*86400000));
  const semAt  = Math.ceil((now - ini) / (7*86400000));
  document.getElementById('semLabel').textContent =
    now < ini ? 'antes do início' : now > fim ? 'encerrado' : `semana ${Math.max(1,semAt)}/${semTot}`;
  document.getElementById('semFill').style.width = pct.toFixed(1) + '%';
  document.getElementById('semPct').textContent = pct.toFixed(0) + '%';
}

// ═══════════════════════════════════════════════
// POPUP DE EVENTO
// ═══════════════════════════════════════════════
const popup = document.getElementById('evPopup');

function closePopup() { popup.classList.remove('open'); }

document.getElementById('evPopupClose').onclick = closePopup;
document.addEventListener('mousedown', e => {
  if (popup.classList.contains('open') && !popup.contains(e.target)) closePopup();
});

function openAulaPopup(aulaId, rect) {
  const entry = AULA_MAP[aulaId]; if (!entry) return;
  const aula = entry.aula, curso = entry.curso;
  // patch aula with curso ref for inline use
  const aulaFull = {...aula, curso};
  if (!aulaFull) return;

  document.getElementById('evPopupTitle').textContent = curso.nome;
  document.getElementById('evPopupMeta').innerHTML = `
    <span>📅 ${aula.date.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</span>
    <span>🕐 ${aula.ini}h – ${aula.fim}h (${aula.horas}h)</span>
    <span>📍 ${esc(curso.local)}</span>
    <span>🔖 ${curso.id} · turma ${curso.turma}</span>
  `;

  const attDiv = document.getElementById('evPopupAtt');
  const cb = document.getElementById('evPopupCb');
  attDiv.style.display = 'block';
  cb.checked = att[aulaId] || false;
  cb.onchange = () => {
    att[aulaId] = cb.checked;
    save(true); renderCalendar(); renderAttendance();
    showToast(cb.checked ? '✓ presença marcada' : 'presença desmarcada');
  };

  document.getElementById('evPopupActions').innerHTML = '';
  positionPopup(rect);
}

function openCustomPopup(evId, rect) {
  const ev = customEvents.find(e => e.id === evId); if (!ev) return;
  const typeLabel = {lembrete:'📌 Lembrete',prova:'📝 Prova',entrega:'📋 Entrega',outro:'📎 Outro'}[ev.type] || '📎';
  document.getElementById('evPopupTitle').innerHTML = `<span style="color:${ev.cor}">${esc(ev.nome)}</span>`;
  document.getElementById('evPopupMeta').innerHTML = `
    <span>${typeLabel}</span>
    <span>📅 ${ev.date.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</span>
    <span>🕐 ${ev.ini} – ${ev.fim}</span>
    ${ev.note ? `<span>📝 ${esc(ev.note)}</span>` : ''}
  `;
  document.getElementById('evPopupAtt').style.display = 'none';

  const acts = document.getElementById('evPopupActions');
  acts.innerHTML = '';
  const editBtn = document.createElement('button');
  editBtn.className = 'ep-btn'; editBtn.textContent = '✎ editar';
  editBtn.onclick = () => { closePopup(); openNewEvModal(ev); };

  const delBtn = document.createElement('button');
  delBtn.className = 'ep-btn danger'; delBtn.textContent = '✕ remover';
  delBtn.onclick = () => {
    customEvents = customEvents.filter(e => e.id !== evId);
    save(true); renderCalendar(); closePopup(); showToast('removido');
  };

  acts.appendChild(editBtn); acts.appendChild(delBtn);
  positionPopup(rect);
}

function positionPopup(rect) {
  popup.classList.add('open');
  // posicionar próximo ao elemento clicado
  const pw = 270, ph = 200;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = rect.right + 8;
  let top  = rect.top;
  if (left + pw > vw) left = rect.left - pw - 8;
  if (top + ph > vh)  top  = vh - ph - 12;
  if (left < 8) left = 8;
  if (top < 8)  top  = 8;
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
}

// ═══════════════════════════════════════════════
// MODAL NOVO EVENTO
// ═══════════════════════════════════════════════
const COLORS = ['#6366f1','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#14b8a6'];
let editingEvId = null; // null = novo, string = editar

function initColorRow() {
  const row = document.getElementById('evColorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch'; s.style.background = c; s.dataset.color = c;
    s.onclick = () => {
      row.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('sel'));
      s.classList.add('sel');
    };
    row.appendChild(s);
  });
  row.querySelector('.color-swatch').classList.add('sel');
}

function getSelectedColor() {
  const sel = document.querySelector('.color-swatch.sel');
  return sel ? sel.dataset.color : COLORS[0];
}

function setSelectedColor(c) {
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('sel', s.dataset.color === c);
  });
}

function openNewEvModal(prefill=null) {
  const modal = document.getElementById('newEvModal');
  editingEvId = prefill ? prefill.id : null;
  document.getElementById('newEvTitle').textContent = editingEvId ? 'Editar evento' : 'Novo evento';
  document.getElementById('evName').value = prefill ? prefill.nome : '';
  document.getElementById('evType').value = prefill ? prefill.type : 'lembrete';
  document.getElementById('evNote').value = prefill ? (prefill.note||'') : '';

  // date
  const d = prefill ? new Date(prefill.date) : new Date();
  document.getElementById('evDate').value = d.toISOString().slice(0,10);
  document.getElementById('evStart').value = prefill ? prefill.ini : '08:00';
  document.getElementById('evEnd').value   = prefill ? prefill.fim : '09:00';

  initColorRow();
  if (prefill) setSelectedColor(prefill.cor);
  modal.classList.add('open');
  document.getElementById('evName').focus();
}

function closeNewEvModal() {
  document.getElementById('newEvModal').classList.remove('open');
  editingEvId = null;
}

document.getElementById('newEvClose').onclick   = closeNewEvModal;
document.getElementById('newEvCancel').onclick  = closeNewEvModal;
document.getElementById('newEvModal').addEventListener('mousedown', e => {
  if (e.target === document.getElementById('newEvModal')) closeNewEvModal();
});

document.getElementById('newEvSave').addEventListener('click', () => {
  const nome  = document.getElementById('evName').value.trim();
  const date  = document.getElementById('evDate').value;
  const ini   = document.getElementById('evStart').value;
  const fim   = document.getElementById('evEnd').value;
  const type  = document.getElementById('evType').value;
  const note  = document.getElementById('evNote').value.trim();
  const cor   = getSelectedColor();

  if (!nome || !date || !ini || !fim) { showToast('preencha título, data e horário'); return; }

  const evDate = parseDateLocal(date);
  if (editingEvId) {
    const ev = customEvents.find(e => e.id === editingEvId);
    if (ev) { ev.nome=nome; ev.date=evDate; ev.ini=ini; ev.fim=fim; ev.type=type; ev.note=note; ev.cor=cor; }
  } else {
    customEvents.push({ id:uid(), nome, date:evDate, ini, fim, type, note, cor });
  }

  // Navegar para a semana do evento criado/editado
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.floor((evDate - today) / 86400000);
  const diffWeeks = Math.floor(diffDays / 7 + (diffDays >= 0 ? 0 : -1));
  // Calcular offset da semana do evento
  const evDow = (evDate.getDay() + 6) % 7;
  const evMon = new Date(evDate); evMon.setDate(evDate.getDate() - evDow);
  const todDow = (today.getDay() + 6) % 7;
  const todMon = new Date(today); todMon.setDate(today.getDate() - todDow);
  wkOff = Math.round((evMon - todMon) / (7 * 86400000));

  save(true); renderCalendar(); closeNewEvModal();
  showToast(editingEvId ? 'evento atualizado' : 'evento criado');
});

// ═══════════════════════════════════════════════
// CALENDÁRIO VERTICAL
// ═══════════════════════════════════════════════
const CAL_INI = 7, CAL_FIM = 21, SLOT = 48; // px/hora

// Lookup rápido: aulaId → { aula, curso }
const AULA_MAP = {};
COURSES.forEach(c => c._aulas.forEach(a => { AULA_MAP[a.id] = { aula:a, curso:c }; }));

// Fix fuso horário: 'YYYY-MM-DD' → Date local (não UTC)
function parseDateLocal(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function renderCalendar() {
  const days    = getWeekDates(wkOff);
  const today   = new Date(); today.setHours(0,0,0,0);
  const now     = new Date();
  const hours   = CAL_FIM - CAL_INI;
  const gridCols = '52px repeat(7,1fr)';

  let h = '';

  // ── HEADER ──
  h += `<div style="display:grid;grid-template-columns:${gridCols};border-bottom:2px solid var(--border);">`;
  h += `<div class="cal-gutter"></div>`;
  days.forEach((d, i) => {
    const isT = d.getTime() === today.getTime();
    const isP = d < today;
    // Ping pulsante só no dia de hoje, na semana atual
    const showPing = isT && wkOff === 0;
    h += `<div class="cal-dh${isT?' is-today':''}${isP&&!isT?' is-past':''}">
      <div class="dname">${DNAMES[i]}</div>
      <div class="dnum${showPing?' today-ping':''}">${d.getDate()}</div>
    </div>`;
  });
  h += '</div>';

  // ── BODY ──
  h += `<div style="display:grid;grid-template-columns:${gridCols};position:relative;">`;

  // Coluna de horas
  h += `<div>`;
  for (let hh = CAL_INI; hh <= CAL_FIM; hh++) {
    h += `<div class="cal-ts"><span class="cal-tl">${hh < 10 ? '0'+hh : hh}:00</span></div>`;
  }
  h += '</div>';

  // Colunas dos dias
  days.forEach((d, di) => {
    const dStr    = d.toISOString().slice(0,10);
    const dIso    = dStr;
    const isT     = d.getTime() === today.getTime();
    const isP     = d < today;

    // Aulas do dia
    const aulasDia = COURSES.flatMap(c =>
      c._aulas.filter(a => a.date.toISOString().slice(0,10) === dStr).map(a => ({...a, curso:c, _type:'aula'}))
    );

    // Eventos custom do dia
    const evsDia = customEvents.filter(e => {
      const ed = new Date(e.date); ed.setHours(0,0,0,0);
      return ed.getTime() === d.getTime();
    }).map(e => {
      const [sh, sm] = e.ini.split(':').map(Number);
      const [eh, em] = e.fim.split(':').map(Number);
      return {...e, _type:'custom', _ini: sh + sm/60, _fim: eh + em/60};
    });

    h += `<div class="cal-dcol${isT?' is-today-col':''}" data-col="${di}" data-date="${dIso}">`;

    // Linhas de hora
    for (let hh = CAL_INI; hh < CAL_FIM; hh++) {
      h += `<div class="cal-hl" data-hour="${hh}" data-date="${dIso}"></div>`;
    }

    // Linha "agora"
    if (isT && wkOff === 0) {
      const mins = (now.getHours() - CAL_INI) * 60 + now.getMinutes();
      const top  = Math.max(0, Math.min(mins / 60 * SLOT, hours * SLOT));
      h += `<div class="now-line" id="nowLine" style="top:${top}px"></div>`;
    }

    // Aulas
    aulasDia.forEach(a => {
      const topPx = (a.ini - CAL_INI) * SLOT;
      const durPx = (a.fim - a.ini)   * SLOT;
      const past  = isP || (isT && a.fim <= now.getHours());
      const chk   = att[a.id] || false;
      h += `<div class="cal-ev ${a.curso.cls}${past?' ev-past':''}"
        style="top:${topPx}px;height:${durPx}px"
        data-aula="${a.id}">
        <div class="ev-name">${esc(a.curso.nome)}</div>
        <div class="ev-time">${a.ini}h–${a.fim}h · ${a.horas}h</div>
        ${chk ? `<div class="ev-check">✓ presente</div>` : ''}
      </div>`;
    });

    // Eventos custom
    evsDia.forEach(e => {
      const topPx = (e._ini - CAL_INI) * SLOT;
      const durPx = Math.max((e._fim - e._ini) * SLOT, 20);
      const typeIcon = {lembrete:'📌',prova:'📝',entrega:'📋',outro:'📎'}[e.type] || '📎';
      h += `<div class="cal-ev ev-custom${isP?' ev-past':''}"
        style="top:${topPx}px;height:${durPx}px;border-color:${e.cor};background:${e.cor}18"
        data-custom="${e.id}">
        <div class="ev-name" style="color:${e.cor}">${typeIcon} ${esc(e.nome)}</div>
        <div class="ev-time">${e.ini}–${e.fim}</div>
      </div>`;
    });

    h += '</div>';
  });

  h += '</div>';
  document.getElementById('calInner').innerHTML = h;
  document.getElementById('wkLabel').textContent = `${fmt(days[0])} – ${fmt(days[6])}`;

  // ── CLICK em aulas ──
  document.querySelectorAll('.cal-ev[data-aula]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openAulaPopup(el.dataset.aula, el.getBoundingClientRect());
    });
  });

  // ── CLICK em eventos custom ──
  document.querySelectorAll('.cal-ev[data-custom]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openCustomPopup(el.dataset.custom, el.getBoundingClientRect());
    });
  });

  // ── CLICK em espaço vazio → novo evento ──
  document.querySelectorAll('.cal-hl').forEach(hl => {
    hl.addEventListener('click', e => {
      if (e.target !== hl) return; // clicou num evento filho
      closePopup();
      const hour = parseInt(hl.dataset.hour);
      const dateStr = hl.dataset.date || hl.closest('.cal-dcol').dataset.date;
      document.getElementById('evDate').value = dateStr || new Date().toISOString().slice(0,10);
      const hStr = hour < 10 ? '0'+hour : ''+hour;
      const h1 = (hour+1) < 10 ? '0'+(hour+1) : ''+(hour+1);
      document.getElementById('evStart').value = hStr + ':00';
      document.getElementById('evEnd').value   = (hour < CAL_FIM - 1) ? h1 + ':00' : hStr + ':50';
      openNewEvModal();
    });
  });
}

// Atualiza linha "agora"
setInterval(() => {
  if (wkOff !== 0) return;
  const line = document.getElementById('nowLine'); if (!line) return;
  const now = new Date();
  const mins = (now.getHours() - CAL_INI) * 60 + now.getMinutes();
  line.style.top = Math.max(0, Math.min(mins / 60 * SLOT, (CAL_FIM-CAL_INI)*SLOT)) + 'px';
}, 60000);

document.getElementById('wkPrev').onclick  = () => { wkOff--; renderCalendar(); };
document.getElementById('wkNext').onclick  = () => { wkOff++; renderCalendar(); };
document.getElementById('btnToday').onclick = () => { wkOff = 0; renderCalendar(); scrollToNow(); };

// Scroll automático para hora atual (ou primeira aula do dia)
function scrollToNow() {
  const calScroll = document.querySelector('.cal-scroll');
  if (!calScroll) return;
  const now = new Date();
  // Alvo: hora atual menos 1h de margem visual, ou 7h como mínimo
  const targetHour = wkOff === 0
    ? Math.max(CAL_INI, now.getHours() - 1)
    : CAL_INI;
  const scrollTop = (targetHour - CAL_INI) * SLOT;
  calScroll.scrollTo({ top: scrollTop, behavior: 'smooth' });
}

// Teclado: ← → para navegar semanas
document.addEventListener('keydown', e => {
  // Só quando não está dentro de um input/textarea/modal
  if (e.target.matches('input,textarea,select')) return;
  if (document.querySelector('.modal-bg.open')) return;
  if (e.key === 'ArrowLeft')  { wkOff--; renderCalendar(); }
  if (e.key === 'ArrowRight') { wkOff++; renderCalendar(); }
  if (e.key === 'Home' || e.key === 't') { wkOff = 0; renderCalendar(); scrollToNow(); }
  if (e.key === 'Escape') { closePopup(); closeNewEvModal(); }
});

// PRESENÇA — BASEADA EM HORAS
// ═══════════════════════════════════════════════
function calcStats(c) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  const aulasPast   = c._aulas.filter(a => a.date <= hoje);
  const aulasFuture = c._aulas.filter(a => a.date >  hoje);

  // horas presentes e horas de falta (só nas aulas já ocorridas)
  const horasPresente = aulasPast.filter(a =>  att[a.id]).reduce((s,a) => s+a.horas, 0);
  const horasFalta    = aulasPast.filter(a => !att[a.id]).reduce((s,a) => s+a.horas, 0);

  const totalH     = c._totalH;
  const maxFaltasH = c._maxFaltasH;

  // Para exibir em "aulas": quantas aulas faltou
  const aulasFaltou = aulasPast.filter(a => !att[a.id]).length;

  const emRisco   = horasFalta > 0 && horasFalta >= maxFaltasH * 0.75;
  const reprovado = horasFalta > maxFaltasH;
  const pctPresenca = totalH > 0 ? ((totalH - horasFalta) / totalH * 100) : 100;
  const hRestantes = maxFaltasH - horasFalta;

  return { totalH, maxFaltasH, horasPresente, horasFalta, aulasFaltou,
           aulasPast, aulasFuture, emRisco, reprovado, pctPresenca, hRestantes };
}

function renderAttendance() {
  const container = document.getElementById('attGrid');
  const openSet = new Set([...container.querySelectorAll('.att-card.open')].map(e => e.dataset.c));
  container.innerHTML = '';

  COURSES.forEach(c => {
    const s = calcStats(c);
    const hoje = new Date(); hoje.setHours(0,0,0,0);

    let pillTxt, pillCls = '';
    if (s.reprovado) {
      pillTxt = `✕ reprovado · ${s.horasFalta}h/${s.maxFaltasH}h falta`;
      pillCls = 'danger';
    } else if (s.emRisco) {
      pillTxt = `⚠ ${s.horasFalta}h/${s.maxFaltasH}h · ${s.hRestantes.toFixed(0)}h restam`;
      pillCls = 'warn';
    } else {
      pillTxt = `${s.horasFalta}h falta · ${s.aulasFaltou} aula${s.aulasFaltou !== 1 ? 's' : ''}`;
      pillCls = s.horasFalta === 0 ? 'safe' : '';
    }

    const fillColor = s.reprovado || s.emRisco ? 'var(--warn)' : c.cor;
    const pctFill   = Math.max(0, Math.min(s.pctPresenca, 100));

    const card = document.createElement('div');
    card.className = 'att-card' + (openSet.has(c.id) ? ' open' : '');
    card.dataset.c = c.id;

    card.innerHTML = `
      <div class="att-head">
        <div class="att-dot" style="background:${c.cor}"></div>
        <span class="att-name">${esc(c.nome)}</span>
        <span class="att-code">${c.id}</span>
        <span class="att-hbadge">${c._totalH}h</span>
        <span class="att-pill ${pillCls}">${pillTxt}</span>
        <span class="att-chev">▾</span>
      </div>
      <div class="att-prog">
        <div class="att-prog-fill" style="width:${pctFill.toFixed(1)}%;background:${fillColor}"></div>
      </div>
      <div class="att-body">
        <!-- Resumo de horas -->
        <div class="att-summary-bar">
          <div class="att-stat">
            <span class="att-stat-label">C. Horária</span>
            <span class="att-stat-val">${c._totalH}h</span>
          </div>
          <div class="att-stat">
            <span class="att-stat-label">Limite faltas</span>
            <span class="att-stat-val">≤ ${c._maxFaltasH}h (25%)</span>
          </div>
          <div class="att-stat">
            <span class="att-stat-label">Horas faltadas</span>
            <span class="att-stat-val ${s.reprovado?'danger':s.emRisco?'danger':s.horasFalta>0?'':'ok'}">${s.horasFalta}h</span>
          </div>
          <div class="att-stat">
            <span class="att-stat-label">Horas p/ reprovar</span>
            <span class="att-stat-val ${s.hRestantes<=0?'danger':s.hRestantes<=c._maxFaltasH*0.3?'danger':''}">${Math.max(0,s.hRestantes)}h</span>
          </div>
          <div class="att-stat">
            <span class="att-stat-label">Presença</span>
            <span class="att-stat-val ${s.pctPresenca>=75?'ok':s.pctPresenca>=60?'':'danger'}">${s.pctPresenca.toFixed(0)}%</span>
          </div>
        </div>

        <!-- Lista de aulas -->
        <div class="att-list" id="al-${c.id}"></div>

        <div class="att-footer">
          <div>
            ${s.emRisco && !s.reprovado ? `<div class="att-warn-txt">⚠ Você pode faltar mais ${Math.max(0,s.hRestantes)}h sem reprovar</div>` : ''}
            ${s.reprovado ? `<div class="att-warn-txt">✕ Limite de ${s.maxFaltasH}h ultrapassado em ${(s.horasFalta-s.maxFaltasH)}h</div>` : ''}
            ${!s.emRisco && !s.reprovado && s.horasFalta === 0 ? `<div style="font-size:11px;color:var(--ok)">✓ Presença perfeita até agora</div>` : ''}
          </div>
          <button class="att-mark-btn" data-c="${c.id}">✓ marcar todas passadas</button>
        </div>
      </div>`;

    container.appendChild(card);

    // ── Lista de aulas ──
    const listEl = card.querySelector(`#al-${c.id}`);
    c._aulas.forEach(aula => {
      const isPast   = aula.date <  hoje;
      const isToday  = aula.date.getTime() === hoje.getTime();
      const checked  = att[aula.id] || false;

      const row = document.createElement('div');
      row.className = 'att-row';

      let badge = '';
      if      (isToday)            badge = `<span class="abadge today">hoje</span>`;
      else if (!isPast)            badge = `<span class="abadge future">futuro</span>`;
      else if (!checked)           badge = `<span class="abadge falta">falta</span>`;

      const WDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      row.innerHTML = `
        <input type="checkbox" class="att-cb" data-id="${aula.id}" ${checked?'checked':''}>
        <span class="att-row-date">${aula.date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})}</span>
        <span class="att-row-day">${WDAYS[aula.date.getDay()]}</span>

      listEl.appendChild(row);

      row.querySelector('.att-cb').addEventListener('change', e => {

        save(true); renderAttendance(); renderCalendar();
      });
    });

    card.querySelector('.att-head').addEventListener('click', () => card.classList.toggle('open'));
    card.querySelector('.att-mark-btn').addEventListener('click', e => {
      e.stopPropagation();
      c._aulas.filter(a => a.date <= hoje).forEach(a => att[a.id] = true);
      save(); renderAttendance(); renderCalendar();
    });
  });
}

// LISTAS
// ═══════════════════════════════════════════════
function renderList(type) {
  const items  = type === 'task' ? tasks  : topics;
  const listEl = document.getElementById(type === 'task' ? 'taskList' : 'topicList');
  const cntEl  = document.getElementById(type === 'task' ? 'taskCnt'  : 'topicCnt');
  const sorted = [...items].sort((a,b) => (a.checked?1:0) - (b.checked?1:0));
  listEl.innerHTML = '';

  sorted.forEach(item => {
    const li = document.createElement('li');
    li.className = 'litem' + (item.checked ? ' done' : '');
    li.dataset.id = item.id;
    li.innerHTML = `
      <input type="checkbox" class="lcb" ${item.checked?'checked':''}>
      <span class="ltxt">${esc(item.text)}</span>
      <button class="ldel" title="remover">✕</button>`;

    li.querySelector('.lcb').addEventListener('change', e => {
      item.checked = e.target.checked;
      save(true);
      if (item.checked) {
        if (listTm[item.id]) clearTimeout(listTm[item.id]);
        listTm[item.id] = setTimeout(() => { delete listTm[item.id]; renderList(type); }, 2500);
      } else {
        if (listTm[item.id]) { clearTimeout(listTm[item.id]); delete listTm[item.id]; }
        renderList(type);
      }
    });

    li.querySelector('.ltxt').addEventListener('dblclick', () => {
      const span = li.querySelector('.ltxt');
      const inp  = document.createElement('input');
      inp.type = 'text'; inp.value = item.text; inp.className = 'linput';
      inp.style.cssText = 'flex:1;margin:0;font-size:13px;';
      span.replaceWith(inp); inp.focus(); inp.select();
      const done = () => { const v = inp.value.trim(); if (v) item.text = v; save(true); renderList(type); };
      inp.addEventListener('blur', done);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); done(); } });
    });

    li.querySelector('.ldel').addEventListener('click', () => {
      const arr = type === 'task' ? tasks : topics;
      const idx = arr.findIndex(t => t.id === item.id); if (idx === -1) return;
      const [removed] = arr.splice(idx, 1);
      undoBuf = {type, item: removed, index: idx};
      if (undoTm) clearTimeout(undoTm);
      undoTm = setTimeout(() => undoBuf = null, 5000);
      save(true); showToast('removido', true); renderList(type);
    });

    listEl.appendChild(li);
  });

  const pend = items.filter(t => !t.checked).length;
  cntEl.textContent = pend > 0 ? `${pend} pendente${pend!==1?'s':''}` : (items.length > 0 ? 'tudo feito ✓' : '0');
}

function addItem(type, text) {
  if (!text.trim()) return;
  (type === 'task' ? tasks : topics).push({id: uid(), text: text.trim(), checked: false});
  save(true); renderList(type);
}

['task','topic'].forEach(t => {
  document.getElementById(t+'Add').onclick = () => {
    const i = document.getElementById(t+'Inp'); addItem(t, i.value); i.value = '';
  };
  document.getElementById(t+'Inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') { const i = e.target; addItem(t, i.value); i.value = ''; }
  });
});

function doExport() {
  const evSerial = customEvents.map(e => ({...e, date: e.date instanceof Date ? e.date.toISOString() : e.date}));
  const data = JSON.stringify({v:4, att, ev: evSerial, tasks, topics}, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([data], {type:'application/json'}));
  a.download = 'rotina-estudos.json'; a.click(); URL.revokeObjectURL(a.href);
  showToast('exportado');
}
['btnExport','btnExport2'].forEach(id => document.getElementById(id).onclick = doExport);
['btnImport','btnImport2'].forEach(id => document.getElementById(id).onclick = () => document.getElementById('importFile').click());

document.getElementById('importFile').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.att || d.attendance) att = d.att || d.attendance;
      if (d.ev) { customEvents = d.ev; customEvents.forEach(e => e.date = new Date(e.date)); }
      if (d.tasks)  tasks  = d.tasks;
      if (d.topics) topics = d.topics;
      save(false); init(); showToast('importado');
    } catch { alert('arquivo inválido'); }
  };
  r.readAsText(f); e.target.value = '';
});

// ═══════════════════════════════════════════════
// FOOTER
// ═══════════════════════════════════════════════
function updateFooter() {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const all  = COURSES.flatMap(c => c._aulas);
  const past = all.filter(a => a.date <= hoje);
  const marcadas = past.filter(a =>  att[a.id]).length;
  const faltas   = past.filter(a => !att[a.id]).length;
  const totalH   = past.reduce((s,a) => s + a.horas, 0);
  const presH    = past.filter(a => att[a.id]).reduce((s,a) => s + a.horas, 0);
  document.getElementById('footerInfo').textContent =
    `${marcadas}/${past.length} aulas passadas marcadas · ${presH}/${totalH}h de presença · ${customEvents.length} evento${customEvents.length!==1?'s':''}`;

  // Badge de faltas no header
  const badge = document.getElementById('hdrBadge');
  const totalFaltasH = COURSES.reduce((s,c) => {
    const p = c._aulas.filter(a => a.date <= hoje && !att[a.id]);
    return s + p.reduce((sh,a) => sh + a.horas, 0);
  }, 0);
  const emRisco = COURSES.some(c => {
    const fH = c._aulas.filter(a => a.date <= hoje && !att[a.id]).reduce((s,a)=>s+a.horas,0);
    return fH >= c._maxFaltasH * 0.75;
  });
  if (totalFaltasH > 0) {
    badge.textContent = `${totalFaltasH}h falta${totalFaltasH!==1?'s':''}`;
    badge.style.display = 'inline-block';
    badge.style.background = emRisco ? 'var(--warnb)' : 'var(--surface2)';
    badge.style.color = emRisco ? 'var(--warn)' : 'var(--text3)';
    badge.style.borderColor = emRisco ? 'color-mix(in srgb,var(--warn) 50%,transparent)' : 'var(--border)';
  } else {
    badge.style.display = 'none';
  }
}

// BTT
// ═══════════════════════════════════════════════
const btt = document.getElementById('btt');
window.addEventListener('scroll', () => btt.classList.toggle('show', scrollY > 300));
btt.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

// SW
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

// INIT
// ═══════════════════════════════════════════════
function init() {
  renderCalendar();
  renderSemProg();
  renderAttendance();
  renderList('task');
  renderList('topic');
  updateFooter();
  initColorRow();
  // Scroll para hora atual após render
  setTimeout(scrollToNow, 100);
}

load(); init(); save(true);

// Re-render a cada minuto (linha de agora, badges "hoje/futuro")
setInterval(() => {
  renderCalendar();
  renderSemProg();
  renderAttendance();
  updateFooter();
}, 60000);

})();
</script>
