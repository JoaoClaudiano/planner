<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rotina · estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f3; --surface:#fff; --surface2:#f0ede8;
  --text:#1a1a18; --text2:#6b6860; --text3:#a8a49e;
  --border:#e8e4de; --border2:#d4cfc8;
  --accent:#2563eb; --accent-bg:#eff6ff;
  --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
  --r:12px; --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --c1:#f59e0b; --c1-bg:#fffbeb;
  --c2:#3b82f6; --c2-bg:#eff6ff;
  --c3:#8b5cf6; --c3-bg:#f5f3ff;
  --c4:#10b981; --c4-bg:#ecfdf5;
  --warn:#ef4444; --warn-bg:#fef2f2; --ok:#10b981;
}
body.dark {
  --bg:#111110; --surface:#1c1c1a; --surface2:#242422;
  --text:#f0ede8; --text2:#9a9690; --text3:#5a5652;
  --border:#2a2a28; --border2:#363632;
  --accent:#60a5fa; --accent-bg:#172040;
  --c1-bg:#2a2010; --c2-bg:#101828; --c3-bg:#1a1228; --c4-bg:#0a2018;
  --warn-bg:#2a1010;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;transition:background .2s,color .2s;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--surface) 92%,transparent);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
.logo{font-family:var(--mono);font-size:13px;color:var(--text2);letter-spacing:.02em}
.logo b{color:var(--accent);font-weight:500}
.live-clock{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--surface2);padding:3px 10px;border-radius:20px;border:1px solid var(--border);letter-spacing:.05em;margin-left:.75rem}
.header-right{display:flex;align-items:center;gap:.4rem}
.hbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:4px 11px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.hbtn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}

/* MAIN */
main{flex:1;max-width:1080px;width:100%;margin:0 auto;padding:1.5rem 1.5rem 2rem;display:flex;flex-direction:column;gap:2rem}

/* SECTION TITLE */
.stitle{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.week-label{font-family:var(--mono);font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.warr{background:var(--surface);border:1px solid var(--border);border-radius:7px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2);transition:all .15s}
.warr:hover{background:var(--surface2)}
.btn-today{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent);padding:4px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-today:hover{background:var(--accent);color:#fff}
.sem-prog{margin-left:auto;display:flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:11px;color:var(--text3)}
.sem-bar{width:72px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sem-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}

/* CALENDAR */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;box-shadow:var(--shadow)}
.cal-inner{min-width:600px}
.cal-head{display:grid;border-bottom:1px solid var(--border)}
.cal-head-time{border-right:1px solid var(--border);padding:8px 0}
.cal-dh{padding:8px 4px;text-align:center;border-right:1px solid var(--border)}
.cal-dh:last-child{border-right:none}
.dname{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-weight:500}
.dnum{font-size:17px;font-weight:300;color:var(--text);font-family:var(--mono);line-height:1.2;margin-top:1px}
.cal-dh.is-today .dnum{background:var(--accent);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0;font-size:13px;font-weight:500}
.cal-dh.is-today .dname{color:var(--accent)}
.cal-dh.is-past{opacity:.45}
.cal-body{display:grid;position:relative}
.cal-tcol{width:52px;min-width:52px}
.cal-ts{height:48px;border-right:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 6px 0 0}
.cal-tl{font-family:var(--mono);font-size:10px;color:var(--text3);transform:translateY(-50%)}
.cal-dcol{border-right:1px solid var(--border);position:relative}
.cal-dcol:last-child{border-right:none}
.cal-hl{height:48px;border-bottom:1px solid var(--border)}
.cal-hl:last-child{border-bottom:none}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--warn);z-index:10;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--warn)}
.cal-ev{position:absolute;left:3px;right:3px;border-radius:6px;padding:4px 6px;font-size:11px;line-height:1.3;overflow:hidden;cursor:pointer;transition:filter .15s,transform .1s;z-index:5;border-left:3px solid}
.cal-ev:hover{filter:brightness(.93);transform:scale(1.01)}
.cal-ev.ev-past{opacity:.5}
.ev-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-time{font-family:var(--mono);font-size:10px;opacity:.65}
.ev-check{font-size:10px;opacity:.8}
.cal-ev.c1{background:var(--c1-bg);border-color:var(--c1);color:var(--text)}
.cal-ev.c2{background:var(--c2-bg);border-color:var(--c2);color:var(--text)}
.cal-ev.c3{background:var(--c3-bg);border-color:var(--c3);color:var(--text)}
.cal-ev.c4{background:var(--c4-bg);border-color:var(--c4);color:var(--text)}

/* ATTENDANCE */
.att-grid{display:flex;flex-direction:column;gap:.6rem}
.att-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.att-head{display:flex;align-items:center;gap:.7rem;padding:.7rem 1rem;cursor:pointer;user-select:none;transition:background .1s}
.att-head:hover{background:var(--surface2)}
.att-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.att-name{font-weight:500;font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-code{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
.att-pill{font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);white-space:nowrap}
.att-pill.danger{background:var(--warn-bg);color:var(--warn);border-color:var(--warn)}
.att-pill.safe{background:#ecfdf5;color:var(--ok);border-color:#a7f3d0}
.att-chev{color:var(--text3);font-size:11px;transition:transform .2s;flex-shrink:0}
.att-card.open .att-chev{transform:rotate(180deg)}
.att-prog{height:3px;background:var(--border)}
.att-prog-fill{height:100%;transition:width .4s}
.att-body{display:none;border-top:1px solid var(--border);padding:.75rem 1rem}
.att-card.open .att-body{display:block}
.att-list{display:flex;flex-direction:column;gap:.3rem;max-height:280px;overflow-y:auto;margin-bottom:.75rem}
.att-row{display:flex;align-items:center;gap:.6rem;padding:.35rem .4rem;border-radius:7px;transition:background .1s}
.att-row:hover{background:var(--surface2)}
.att-cb{width:15px;height:15px;border-radius:4px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.att-date{font-family:var(--mono);font-size:11px;color:var(--text3);width:88px;flex-shrink:0}
.att-weekday{font-size:12px;color:var(--text2);width:28px;flex-shrink:0}
.att-htime{font-family:var(--mono);font-size:11px;color:var(--text3);flex:1}
.att-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500}
.badge-today{background:var(--accent);color:#fff}
.badge-future{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.badge-falta{background:var(--warn-bg);color:var(--warn)}
.att-footer{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap;padding-top:.6rem;border-top:1px solid var(--border)}
.att-sum{font-size:12px;color:var(--text2)}
.att-sum strong{color:var(--text)}
.att-warn{font-size:11px;color:var(--warn);display:flex;align-items:center;gap:.3rem;margin-top:.25rem}
.att-mark-all{background:none;border:1px solid var(--border);padding:4px 11px;border-radius:7px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.att-mark-all:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}

/* LISTS */
.lists-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:580px){.lists-grid{grid-template-columns:1fr}}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.lcard-head{padding:.65rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:500;color:var(--text2)}
.lcnt{font-family:var(--mono);font-size:11px;background:var(--surface2);padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text3)}
.litems{padding:.2rem 0;min-height:40px;max-height:300px;overflow-y:auto}
.litem{display:flex;align-items:center;gap:.55rem;padding:.4rem .75rem;transition:background .1s,opacity .3s}
.litem:hover{background:var(--surface2)}
.litem.done{opacity:.4}
.lcb{width:14px;height:14px;border-radius:4px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.ltxt{flex:1;font-size:13px;cursor:pointer;padding:1px 3px;border-radius:4px;transition:background .1s}
.ltxt:hover{background:var(--border)}
.litem.done .ltxt{text-decoration:line-through;color:var(--text3)}
.ldel{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:4px;font-size:13px;opacity:0;transition:opacity .15s}
.litem:hover .ldel{opacity:1}
.ldel:hover{color:var(--warn);background:var(--warn-bg)}
.ladd{display:flex;gap:.4rem;padding:.55rem .75rem;border-top:1px solid var(--border)}
.linput{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
.linput:focus{border-color:var(--accent);background:var(--surface)}
.laddbtn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 13px;font-size:16px;cursor:pointer;transition:opacity .15s;line-height:1}
.laddbtn:hover{opacity:.85}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:.5rem 1rem;border-radius:8px;font-size:12px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;display:flex;align-items:center;gap:.7rem;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1;pointer-events:auto}
.tundo{background:none;border:1px solid rgba(255,255,255,.3);color:inherit;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--sans)}
.tundo:hover{background:rgba(255,255,255,.15)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:.65rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.finfo{font-family:var(--mono);font-size:11px;color:var(--text3)}
.factions{display:flex;gap:.4rem}

/* BTT */
.btt{position:fixed;bottom:1.5rem;right:1.5rem;width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s,transform .1s;z-index:50}
.btt.show{opacity:1;pointer-events:auto}
.btt:hover{transform:translateY(-2px)}

@media(max-width:640px){.sem-prog{display:none}.live-clock{display:none}main{padding:1rem;gap:1.5rem}}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="logo">rotina<b>·</b>estudos</span>
    <span class="live-clock" id="liveClock">00:00:00</span>
  </div>
  <div class="header-right">
    <button class="hbtn" id="btnDark">🌙 escuro</button>
    <button class="hbtn" id="btnExport">↑ exportar</button>
    <button class="hbtn" id="btnImport">↓ importar</button>
  </div>
</header>

<main>

  <!-- AGENDA SEMANAL -->
  <section>
    <p class="stitle">agenda semanal</p>
    <div class="week-nav">
      <button class="warr" id="wkPrev">‹</button>
      <button class="warr" id="wkNext">›</button>
      <span class="week-label" id="wkLabel">—</span>
      <button class="btn-today" id="btnToday">hoje</button>
      <div class="sem-prog">
        <span id="semLabel">—</span>
        <div class="sem-bar"><div class="sem-fill" id="semFill"></div></div>
        <span id="semPct">—</span>
      </div>
    </div>
    <div class="cal-wrap"><div class="cal-inner" id="calInner"></div></div>
  </section>

  <!-- PRESENÇA -->
  <section>
    <p class="stitle">presença por disciplina</p>
    <div class="att-grid" id="attGrid"></div>
  </section>

  <!-- ANOTAÇÕES -->
  <section>
    <p class="stitle">anotações</p>
    <div class="lists-grid">
      <div class="lcard">
        <div class="lcard-head"><span>⏱ tarefas</span><span class="lcnt" id="taskCnt">—</span></div>
        <ul class="litems" id="taskList"></ul>
        <div class="ladd"><input class="linput" id="taskInp" placeholder="nova tarefa…" autocomplete="off"><button class="laddbtn" id="taskAdd">+</button></div>
      </div>
      <div class="lcard">
        <div class="lcard-head"><span>📚 tópicos</span><span class="lcnt" id="topicCnt">—</span></div>
        <ul class="litems" id="topicList"></ul>
        <div class="ladd"><input class="linput" id="topicInp" placeholder="novo tópico…" autocomplete="off"><button class="laddbtn" id="topicAdd">+</button></div>
      </div>
    </div>
  </section>

</main>

<footer>
  <span class="finfo" id="footerInfo">—</span>
  <div class="factions">
    <button class="hbtn" id="btnExport2">↑ exportar</button>
    <button class="hbtn" id="btnImport2">↓ importar</button>
  </div>
</footer>

<button class="btt" id="btt">↑</button>
<div class="toast" id="toast"><span id="toastMsg"></span></div>
<input type="file" id="importFile" accept=".json" style="display:none">

<script>
'use strict';
(function(){

// ── CURSOS ──────────────────────────────────────────────────────────────────
// dia: 0=dom,1=seg,2=ter,3=qua,4=qui,5=sex,6=sab
const COURSES = [
  { id:'TC0610', nome:'Materiais Betuminosos',       turma:'01', local:'Bloco 708 – Sala 24',
    horarios:[{dia:3,ini:14,fim:17}],
    ini: new Date(2026,2,2), fim: new Date(2026,6,7), cls:'c1', cor:'var(--c1)' },
  { id:'TB0793', nome:'Resistência dos Materiais I', turma:'02', local:'Bloco 708 – Sala 23',
    horarios:[{dia:2,ini:14,fim:16},{dia:4,ini:14,fim:16}],
    ini: new Date(2026,2,2), fim: new Date(2026,6,7), cls:'c2', cor:'var(--c2)' },
  { id:'TD0022', nome:'Instalações Hidrossanitárias',turma:'01', local:'Bloco 727 – Sala 21',
    horarios:[{dia:1,ini:10,fim:13}],
    ini: new Date(2026,2,2), fim: new Date(2026,6,7), cls:'c3', cor:'var(--c3)' },
  { id:'TD0023', nome:'Sistemas de Abastecimento',   turma:'01', local:'Bloco 708 – Sala 22',
    horarios:[{dia:1,ini:8,fim:10}],
    ini: new Date(2026,2,2), fim: new Date(2026,6,7), cls:'c4', cor:'var(--c4)' },
];
const FALTA_LIMIT = 0.25;

function gerarAulas(c){
  const out=[];
  c.horarios.forEach(h=>{
    let d=new Date(c.ini);
    while(d.getDay()!==h.dia) d.setDate(d.getDate()+1);
    while(d<=c.fim){
      out.push({
        id:`${c.id}-${d.toISOString().slice(0,10)}-${h.ini}`,
        cursoId:c.id, date:new Date(d), ini:h.ini, fim:h.fim
      });
      d=new Date(d); d.setDate(d.getDate()+7);
    }
  });
  return out.sort((a,b)=>a.date-b.date||a.ini-b.ini);
}
COURSES.forEach(c=>c._aulas=gerarAulas(c));

// ── ESTADO ───────────────────────────────────────────────────────────────────
const LS={att:'v3_att',tasks:'v3_tasks',topics:'v3_topics',dark:'v3_dark'};
let att={}, tasks=[], topics=[], undoBuf=null, undoTm=null;
const listTm={};

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36)}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function load(){
  try{att=JSON.parse(localStorage.getItem(LS.att)||'{}')}catch{att={}}
  function mig(raw,defs){
    if(!raw) return defs.map(t=>({id:uid(),text:t,checked:false}));
    try{
      const p=JSON.parse(raw);
      if(!Array.isArray(p)) return defs.map(t=>({id:uid(),text:t,checked:false}));
      if(p.length&&typeof p[0]==='string') return p.map(t=>({id:uid(),text:t,checked:false}));
      return p;
    }catch{return defs.map(t=>({id:uid(),text:t,checked:false}))}
  }
  tasks=mig(localStorage.getItem(LS.tasks),[
    'Revisar Materiais Betuminosos cap.2',
    'Exercícios Resistência dos Materiais',
    'Resumo Instalações Hidrossanitárias'
  ]);
  topics=mig(localStorage.getItem(LS.topics),[
    'TC0610 – ligantes betuminosos',
    'TC0610 – ensaio de penetração',
    'TB0793 – lei de Hooke',
    'TD0022 – ramais e colunas',
    'TD0023 – adutoras e estações'
  ]);
  const savedDark=localStorage.getItem(LS.dark);
  const sysDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  if(savedDark!==null?savedDark==='true':sysDark){
    document.body.classList.add('dark');
    document.getElementById('btnDark').textContent='☀ claro';
  }
}

function save(quiet=false){
  localStorage.setItem(LS.att,JSON.stringify(att));
  localStorage.setItem(LS.tasks,JSON.stringify(tasks));
  localStorage.setItem(LS.topics,JSON.stringify(topics));
  if(!quiet) showToast('salvo');
  updateFooter();
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTm=null;
function showToast(msg,undo=false){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  const old=el.querySelector('.tundo'); if(old) old.remove();
  if(undo){
    const b=document.createElement('button');
    b.className='tundo'; b.textContent='desfazer';
    b.onclick=()=>{doUndo();el.classList.remove('show')};
    el.appendChild(b);
  }
  el.classList.add('show');
  if(toastTm) clearTimeout(toastTm);
  toastTm=setTimeout(()=>el.classList.remove('show'),undo?5000:1800);
}
function doUndo(){
  if(!undoBuf) return;
  const{type,item,index}=undoBuf;
  (type==='task'?tasks:topics).splice(index,0,item);
  save(true); renderList(type); undoBuf=null;
}

// ── RELÓGIO ──────────────────────────────────────────────────────────────────
function tick(){
  document.getElementById('liveClock').textContent=
    new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick,1000); tick();

// ── SEMANA ───────────────────────────────────────────────────────────────────
let wkOff=0;
const DNAMES=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
// JS: 0=dom,1=seg,...,6=sab → para exibir seg–dom: índice 0 do array = segunda
// getDay() retorna 0=dom. Para mapear: (getDay()+6)%7 = 0..6 (seg=0,dom=6)

function getWeekDates(off=0){
  const now=new Date(); now.setHours(0,0,0,0);
  const dow=(now.getDay()+6)%7; // 0=seg,6=dom
  const mon=new Date(now); mon.setDate(now.getDate()-dow+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}

function fmtShort(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}

function renderSemProg(){
  const ini=new Date(2026,2,2), fim=new Date(2026,6,7), now=new Date();
  const total=fim-ini, elapsed=Math.min(Math.max(now-ini,0),total);
  const pct=total>0?(elapsed/total*100):0;
  const semTot=Math.ceil(total/(7*86400000));
  const semAt=Math.ceil((now-ini)/(7*86400000));
  document.getElementById('semLabel').textContent=
    now<ini?'antes do início':now>fim?'encerrado':`semana ${Math.max(1,semAt)}/${semTot}`;
  document.getElementById('semFill').style.width=pct.toFixed(1)+'%';
  document.getElementById('semPct').textContent=pct.toFixed(0)+'%';
}

// ── CALENDÁRIO ───────────────────────────────────────────────────────────────
const CAL_INI=7, CAL_FIM=20, SLOT=48; // px por hora

function renderCalendar(){
  const days=getWeekDates(wkOff);
  const today=new Date(); today.setHours(0,0,0,0);
  const now=new Date();
  const hours=CAL_FIM-CAL_INI;
  const cols=`52px repeat(7,1fr)`;

  // header
  let h=`<div style="display:grid;grid-template-columns:${cols};border-bottom:1px solid var(--border);">
    <div class="cal-head-time"></div>`;
  days.forEach((d,i)=>{
    const isT=d.getTime()===today.getTime();
    const isP=d<today;
    h+=`<div class="cal-dh${isT?' is-today':''}${isP&&!isT?' is-past':''}">
      <div class="dname">${DNAMES[i]}</div>
      <div class="dnum">${d.getDate()}</div>
    </div>`;
  });
  h+='</div>';

  // body
  h+=`<div style="display:grid;grid-template-columns:${cols};position:relative;">`;

  // coluna de horas
  h+=`<div class="cal-tcol">`;
  for(let hh=CAL_INI;hh<=CAL_FIM;hh++){
    h+=`<div class="cal-ts"><span class="cal-tl">${hh<10?'0'+hh:hh}:00</span></div>`;
  }
  h+='</div>';

  // colunas dos dias
  days.forEach((d,di)=>{
    const dStr=d.toISOString().slice(0,10);
    const isT=d.getTime()===today.getTime();
    const isP=d<today;

    const aulasDia=COURSES.flatMap(c=>
      c._aulas.filter(a=>a.date.toISOString().slice(0,10)===dStr).map(a=>({...a,curso:c}))
    );

    h+=`<div class="cal-dcol">`;
    for(let hh=CAL_INI;hh<CAL_FIM;hh++) h+=`<div class="cal-hl"></div>`;

    // linha "agora"
    if(isT&&wkOff===0){
      const mins=(now.getHours()-CAL_INI)*60+now.getMinutes();
      const top=Math.max(0,Math.min(mins/60*SLOT,hours*SLOT));
      h+=`<div class="now-line" id="nowLine" style="top:${top}px"></div>`;
    }

    aulasDia.forEach(a=>{
      const topPx=(a.ini-CAL_INI)*SLOT;
      const durPx=(a.fim-a.ini)*SLOT;
      const past=isP||(isT&&a.fim<=now.getHours());
      const checked=att[a.id]||false;
      h+=`<div class="cal-ev ${a.curso.cls}${past?' ev-past':''}"
        style="top:${topPx}px;height:${durPx}px"
        data-id="${a.id}">
        <div class="ev-name">${esc(a.curso.nome)}</div>
        <div class="ev-time">${a.ini}h–${a.fim}h</div>
        ${checked?`<div class="ev-check">✓ presente</div>`:''}
      </div>`;
    });

    h+='</div>';
  });
  h+='</div>';

  document.getElementById('calInner').innerHTML=h;

  // semana label
  document.getElementById('wkLabel').textContent=`${fmtShort(days[0])} – ${fmtShort(days[6])}`;

  // click nos eventos
  document.querySelectorAll('.cal-ev').forEach(ev=>{
    ev.addEventListener('click',()=>{
      const id=ev.dataset.id;
      att[id]=!att[id];
      save(true);
      showToast(att[id]?'✓ presença marcada':'presença desmarcada');
      renderCalendar();
      renderAttendance();
    });
  });
}

// atualizar linha de agora a cada minuto
setInterval(()=>{
  if(wkOff!==0) return;
  const line=document.getElementById('nowLine'); if(!line) return;
  const now=new Date();
  const mins=(now.getHours()-CAL_INI)*60+now.getMinutes();
  const hours=CAL_FIM-CAL_INI;
  line.style.top=Math.max(0,Math.min(mins/60*SLOT,hours*SLOT))+'px';
},60000);

document.getElementById('wkPrev').onclick=()=>{wkOff--;renderCalendar()};
document.getElementById('wkNext').onclick=()=>{wkOff++;renderCalendar()};
document.getElementById('btnToday').onclick=()=>{wkOff=0;renderCalendar()};

// ── PRESENÇA ─────────────────────────────────────────────────────────────────
function calcStats(c){
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const total=c._aulas.length;
  const passadas=c._aulas.filter(a=>a.date<=hoje);
  const futuras=c._aulas.filter(a=>a.date>hoje);
  const presentes=c._aulas.filter(a=>att[a.id]).length;
  const faltasPast=passadas.filter(a=>!att[a.id]).length;
  const maxFaltas=Math.floor(total*FALTA_LIMIT);
  const emRisco=faltasPast>0&&faltasPast>=maxFaltas*0.75;
  const reprovado=faltasPast>maxFaltas;
  const pct=total>0?(presentes/total*100):100;
  return{total,passadas,futuras,presentes,faltasPast,maxFaltas,emRisco,reprovado,pct};
}

function renderAttendance(){
  const container=document.getElementById('attGrid');
  const openSet=new Set([...container.querySelectorAll('.att-card.open')].map(e=>e.dataset.c));
  container.innerHTML='';

  COURSES.forEach(c=>{
    const s=calcStats(c);
    const hoje=new Date(); hoje.setHours(0,0,0,0);

    let pillTxt, pillCls='';
    if(s.reprovado){pillTxt=`✕ reprovado (${s.faltasPast}/${s.maxFaltas} faltas)`;pillCls='danger';}
    else if(s.emRisco){pillTxt=`⚠ ${s.faltasPast}/${s.maxFaltas} faltas`;pillCls='danger';}
    else{pillTxt=`${s.faltasPast} falta${s.faltasPast!==1?'s':''} · ${s.presentes}/${s.total}`;pillCls=s.faltasPast===0?'safe':'';}

    const fillColor=s.reprovado||s.emRisco?'var(--warn)':c.cor;
    const card=document.createElement('div');
    card.className='att-card'+(openSet.has(c.id)?' open':'');
    card.dataset.c=c.id;

    card.innerHTML=`
      <div class="att-head">
        <div class="att-dot" style="background:${c.cor}"></div>
        <span class="att-name">${esc(c.nome)}</span>
        <span class="att-code">${c.id}</span>
        <span class="att-pill ${pillCls}">${pillTxt}</span>
        <span class="att-chev">▾</span>
      </div>
      <div class="att-prog"><div class="att-prog-fill" style="width:${s.pct.toFixed(1)}%;background:${fillColor}"></div></div>
      <div class="att-body">
        <div class="att-list" id="al-${c.id}"></div>
        <div class="att-footer">
          <div>
            <div class="att-sum">presença: <strong>${s.pct.toFixed(0)}%</strong> · faltas usadas: <strong>${s.faltasPast}/${s.maxFaltas}</strong> · aulas passadas: <strong>${s.passadas.length}</strong></div>
            ${s.emRisco&&!s.reprovado?`<div class="att-warn">⚠ ${s.maxFaltas-s.faltasPast} falta${s.maxFaltas-s.faltasPast!==1?'s':''} restante${s.maxFaltas-s.faltasPast!==1?'s':''} antes de reprovar</div>`:''}
            ${s.reprovado?`<div class="att-warn">✕ limite ultrapassado em ${s.faltasPast-s.maxFaltas} falta${s.faltasPast-s.maxFaltas>1?'s':''}</div>`:''}
          </div>
          <button class="att-mark-all" data-c="${c.id}">✓ marcar todas passadas</button>
        </div>
      </div>`;

    container.appendChild(card);

    // lista de aulas
    const listEl=card.querySelector(`#al-${c.id}`);
    c._aulas.forEach(aula=>{
      const isPast=aula.date<hoje;
      const isToday=aula.date.getTime()===hoje.getTime();
      const checked=att[aula.id]||false;
      const row=document.createElement('div');
      row.className='att-row';

      let badge='';
      if(isToday) badge=`<span class="att-badge badge-today">hoje</span>`;
      else if(!isPast) badge=`<span class="att-badge badge-future">futuro</span>`;
      else if(!checked) badge=`<span class="att-badge badge-falta">falta</span>`;

      row.innerHTML=`
        <input type="checkbox" class="att-cb" data-id="${aula.id}" ${checked?'checked':''}>
        <span class="att-date">${aula.date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})}</span>
        <span class="att-weekday">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][aula.date.getDay()]}</span>
        <span class="att-htime">${aula.ini}h–${aula.fim}h</span>
        ${badge}`;
      listEl.appendChild(row);

      row.querySelector('.att-cb').addEventListener('change',e=>{
        att[aula.id]=e.target.checked;
        save(true); renderAttendance(); renderCalendar();
      });
    });

    card.querySelector('.att-head').addEventListener('click',()=>card.classList.toggle('open'));
    card.querySelector('.att-mark-all').addEventListener('click',e=>{
      e.stopPropagation();
      const hoje2=new Date(); hoje2.setHours(0,0,0,0);
      c._aulas.filter(a=>a.date<=hoje2).forEach(a=>att[a.id]=true);
      save(); renderAttendance(); renderCalendar();
    });
  });
}

// ── LISTAS ───────────────────────────────────────────────────────────────────
function renderList(type){
  const items=type==='task'?tasks:topics;
  const listEl=document.getElementById(type==='task'?'taskList':'topicList');
  const cntEl=document.getElementById(type==='task'?'taskCnt':'topicCnt');
  const sorted=[...items].sort((a,b)=>(a.checked?1:0)-(b.checked?1:0));
  listEl.innerHTML='';

  sorted.forEach(item=>{
    const li=document.createElement('li');
    li.className='litem'+(item.checked?' done':'');
    li.dataset.id=item.id;
    li.innerHTML=`
      <input type="checkbox" class="lcb" ${item.checked?'checked':''}>
      <span class="ltxt">${esc(item.text)}</span>
      <button class="ldel" title="remover">✕</button>`;

    li.querySelector('.lcb').addEventListener('change',e=>{
      item.checked=e.target.checked;
      save(true);
      if(item.checked){
        if(listTm[item.id]) clearTimeout(listTm[item.id]);
        listTm[item.id]=setTimeout(()=>{delete listTm[item.id];renderList(type);},2500);
      } else {
        if(listTm[item.id]){clearTimeout(listTm[item.id]);delete listTm[item.id];}
        renderList(type);
      }
    });

    li.querySelector('.ltxt').addEventListener('dblclick',()=>{
      const span=li.querySelector('.ltxt');
      const inp=document.createElement('input');
      inp.type='text'; inp.value=item.text; inp.className='linput';
      inp.style.cssText='flex:1;margin:0;font-size:13px;';
      span.replaceWith(inp); inp.focus(); inp.select();
      const done=()=>{const v=inp.value.trim();if(v)item.text=v;save(true);renderList(type);};
      inp.addEventListener('blur',done);
      inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();done();}});
    });

    li.querySelector('.ldel').addEventListener('click',()=>{
      const arr=type==='task'?tasks:topics;
      const idx=arr.findIndex(t=>t.id===item.id); if(idx===-1) return;
      const[removed]=arr.splice(idx,1);
      undoBuf={type,item:removed,index:idx};
      if(undoTm) clearTimeout(undoTm);
      undoTm=setTimeout(()=>undoBuf=null,5000);
      save(true); showToast('removido',true); renderList(type);
    });

    listEl.appendChild(li);
  });

  const pend=items.filter(t=>!t.checked).length;
  cntEl.textContent=pend>0?`${pend} pendente${pend!==1?'s':''}`:(items.length>0?'tudo feito ✓':'0');
}

function addItem(type,text){
  if(!text.trim()) return;
  (type==='task'?tasks:topics).push({id:uid(),text:text.trim(),checked:false});
  save(true); renderList(type);
}

['task','topic'].forEach(t=>{
  document.getElementById(t+'Add').onclick=()=>{const i=document.getElementById(t+'Inp');addItem(t,i.value);i.value='';};
  document.getElementById(t+'Inp').addEventListener('keydown',e=>{if(e.key==='Enter'){const i=e.target;addItem(t,i.value);i.value='';}});
});

// ── DARK MODE ────────────────────────────────────────────────────────────────
document.getElementById('btnDark').addEventListener('click',()=>{
  const dark=document.body.classList.toggle('dark');
  document.getElementById('btnDark').textContent=dark?'☀ claro':'🌙 escuro';
  localStorage.setItem(LS.dark,dark);
});

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function doExport(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({v:3,att,tasks,topics},null,2)],{type:'application/json'}));
  a.download='rotina-estudos.json'; a.click(); URL.revokeObjectURL(a.href);
  showToast('exportado');
}
['btnExport','btnExport2'].forEach(id=>document.getElementById(id).onclick=doExport);
['btnImport','btnImport2'].forEach(id=>document.getElementById(id).onclick=()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.att) att=d.att;
      if(d.attendance) att=d.attendance; // compat v2
      if(d.tasks) tasks=d.tasks;
      if(d.topics) topics=d.topics;
      save(false); init(); showToast('importado');
    }catch{alert('arquivo inválido');}
  };
  r.readAsText(f); e.target.value='';
});

// ── FOOTER ───────────────────────────────────────────────────────────────────
function updateFooter(){
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const all=COURSES.flatMap(c=>c._aulas);
  const past=all.filter(a=>a.date<=hoje).length;
  const marcadas=Object.values(att).filter(Boolean).length;
  document.getElementById('footerInfo').textContent=
    `${marcadas} de ${past} aulas passadas com presença · ${all.length} aulas no semestre`;
}

// ── BACK TO TOP ──────────────────────────────────────────────────────────────
const btt=document.getElementById('btt');
window.addEventListener('scroll',()=>btt.classList.toggle('show',scrollY>300));
btt.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

// ── SERVICE WORKER ───────────────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  renderCalendar();
  renderSemProg();
  renderAttendance();
  renderList('task');
  renderList('topic');
  updateFooter();
}

load(); init(); save(true);

// re-render leve a cada 60s (atualiza tempo, linha de agora, badges "hoje/futuro")
setInterval(()=>{
  renderCalendar();
  renderSemProg();
  renderAttendance();
  updateFooter();
},60000);

})();
</script>
